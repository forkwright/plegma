name: Rust

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# WHY: fmt, clippy, and tests are validated by kanon pre-push.
# GitHub CI only validates what can't be checked locally:
# feature isolation, MSRV compatibility, and binary smoke tests.

jobs:
  # WHY: Verify feature-gated code compiles independently.
  # Agents can't easily test all feature combos locally.
  feature-isolation:
    name: Feature isolation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # PROJECT: add project-specific feature combos below
          - name: no-default-features
            args: "--workspace --no-default-features"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check ${{ matrix.name }}
        run: cargo check ${{ matrix.args }}

  # WHY: Ensure we don't accidentally use features newer than MSRV.
  # Can't be tested locally without managing multiple toolchains.
  msrv:
    # PROJECT: update MSRV version and toolchain hash
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@ff9b7e97f1c15b93257ad9a20e43c84dc3eef47b # 1.85
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check MSRV
        run: cargo check --workspace

  # WHY: Catch broken doc links. Fast (no test execution).
  docs:
    name: Rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build docs
        run: cargo doc --workspace --no-deps

  # WHY: Binary builds and runs correctly with default features.
  # Catches link errors and missing runtime deps.
  smoke:
    name: Binary smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # PROJECT: replace BINARY_CRATE and BINARY_NAME with your project's values
      - name: Build binary
        run: cargo build --release -p BINARY_CRATE
      - name: Verify binary runs
        run: ./target/release/BINARY_NAME --version || ./target/release/BINARY_NAME --help || true
