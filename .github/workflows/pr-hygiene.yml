name: PR Hygiene

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  size-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR size (advisory)
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            // NOTE: purely advisory — always exits 0 so it never blocks CI
            try {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
              });

              const totalChanges = files.reduce((sum, f) => sum + f.changes, 0);
              const fileCount = files.length;

              core.info(`PR has ${fileCount} files with ${totalChanges} total line changes`);

              if (totalChanges > 500 || fileCount > 30) {
                core.warning(`Large PR: ${fileCount} files, ${totalChanges} lines changed. Consider splitting.`);

                const body = [
                  `⚠️ **Large PR detected** — ${fileCount} files, ${totalChanges} lines changed.`,
                  '',
                  'Consider splitting into smaller PRs for easier review. Not a blocker, just a signal.',
                ].join('\n');

                const { data: comments } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                });

                const existing = comments.find(c =>
                  c.user.login === 'github-actions[bot]' &&
                  c.body.includes('Large PR detected')
                );

                if (!existing) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body,
                  });
                }
              }
            } catch (error) {
              // NOTE: advisory check — never block PRs on transient API failures
              core.warning(`Size check skipped: ${error.message}`);
            }
