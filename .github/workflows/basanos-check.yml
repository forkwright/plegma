name: Basanos Standards Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-attestation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Gate-Passed trailer
        run: |
          # WHY: kanon gate runs locally on menos (32c/128GB) before push.
          # GH Actions just verifies the attestation exists — no build needed.
          commits=$(git log --format="%H" origin/main..HEAD)
          if [ -z "$commits" ]; then
            echo "ERROR: No commits found in PR"
            exit 1
          fi

          found=false
          for sha in $commits; do
            body=$(git log -1 --format="%b" "$sha")
            if echo "$body" | grep -q "^Gate-Passed: kanon"; then
              version=$(echo "$body" | grep "^Gate-Passed:" | head -1)
              echo "Found gate attestation: $version"
              found=true
              break
            fi
          done

          if [ "$found" = false ]; then
            echo "ERROR: No Gate-Passed trailer found in any PR commit."
            echo "Run 'kanon gate' locally and commit with the trailer."
            exit 1
          fi
