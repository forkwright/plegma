name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test
        run: cargo test --workspace

  build:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          # PROJECT: replace BINARY_NAME in artifact values
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: BINARY_NAME-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: BINARY_NAME-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: BINARY_NAME-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: BINARY_NAME-macos-aarch64
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        # PROJECT: add --features as needed
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.cross }}
        # PROJECT: add --features as needed
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          bin="${{ matrix.artifact }}-${{ steps.version.outputs.version }}"
          # PROJECT: replace BINARY_NAME with the actual binary name
          cp "target/${{ matrix.target }}/release/BINARY_NAME" "$bin"
          echo "BIN=$bin" >> "$GITHUB_ENV"

      - name: Generate checksum (Linux)
        if: runner.os == 'Linux'
        run: sha256sum "$BIN" > "$BIN.sha256"

      - name: Generate checksum (macOS)
        if: runner.os == 'macOS'
        run: shasum -a 256 "$BIN" > "$BIN.sha256"

      - name: Upload binary and checksum
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" \
            "$BIN" \
            "$BIN.sha256" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # PROJECT: replace BINARY_NAME in artifact-name and output-file
      - uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0
        with:
          artifact-name: BINARY_NAME-sbom.spdx.json
          output-file: BINARY_NAME-sbom.spdx.json

      - name: Attach SBOM to release
        # PROJECT: replace BINARY_NAME
        run: gh release upload "${GITHUB_REF#refs/tags/}" BINARY_NAME-sbom.spdx.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
